name: validate-spec
on: [push, pull_request]

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive          # pull the tia-autocode engine at engine/
      - name: Validate spec (offline, no TIA)
        shell: cmd
        run: powershell -NoProfile -ExecutionPolicy Bypass -File validate.ps1
