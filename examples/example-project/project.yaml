# Example tia-autocode project manifest (Phase 0 reference + validator fixture).
# In a real private project repo this sits at the root; the engine is a git submodule.
project:
  name: ExampleMachine
  path: _out/ExampleMachine            # relative to this manifest; gitignored (see .gitignore)
portal:
  new: true                            # start our own instance (recommended for writes)
  ui: false
plcs:
  - name: PLC_1
    orderNumber: "OrderNumber:6ES7 515-2FM02-0AB0/V2.9"   # S7-1515F-2 PN
    modules:
      - data/PLC_1.modules.csv                             # rack layout (DI/DQ/AI)
    tags:
      - data/PLC_1.tags.csv
    udts:
      - data/PLC_1.udts.csv
    dbs:
      blocks: data/PLC_1.dbs.blocks.csv
      members: data/PLC_1.dbs.members.csv
    logic:
      - logic/FC_Scale.scl
      - logic/FB_MotorStarter.scl
    compile: true
hmis:
  - name: HMI_1
    # WinCC KTP700 Comfort panel. orderNumber = MLFB + panel image version.
    # Validated live on TIA V19; adjust the /version segment to match your catalog.
    orderNumber: "OrderNumber:6AV2 124-1GC01-0AX0/17.0.0.0"
    deviceItemName: "KTP700 Comfort"
    # HMI tags are authored as a spreadsheet for the record; on Comfort/Advanced they
    # are applied by exporting a tag table, editing the XML, and re-importing
    # (Export-/Import-TiaHmiTagTable) - the tag DataType is a typed link, not a string.
    tags:
      - data/HMI_1.hmitags.csv
build:
  order: [udts, logic, dbs, tags]   # logic before dbs so instance DBs find their FB
  snapshotDir: generated
  save: true                        # persist so the generated project opens populated
